<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多 Agent 后端研发提效系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7f8; color: #202124; }
        .container { max-width: 1080px; margin: 0 auto; padding: 32px 20px; }
        .hero { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 12px 36px rgba(0,0,0,.06); }
        h1 { margin: 0 0 12px; font-size: 28px; }
        p { line-height: 1.7; color: #4b5563; }
        label { display: block; margin: 18px 0 8px; font-weight: 700; }
        input, textarea { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 12px; padding: 12px 14px; font-size: 15px; background: #fff; }
        textarea { min-height: 170px; resize: vertical; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
        button { border: 0; border-radius: 12px; padding: 12px 18px; cursor: pointer; font-weight: 700; background: #111827; color: white; }
        button.secondary { background: #374151; }
        pre { margin-top: 24px; background: #111827; color: #e5e7eb; padding: 18px; border-radius: 16px; overflow: auto; min-height: 180px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 18px; }
        .card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 14px; padding: 14px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <section class="hero">
        <h1>多 Agent 后端研发提效系统</h1>
        <p>输入需求后，系统将依次执行需求解析、架构设计、代码生成、代码审查和测试规划，并支持导出生成代码 ZIP。</p>
        <div class="grid">
            <div class="card">长链推理：从需求到测试闭环</div>
            <div class="card">多 Agent 协作：职责分离、过程可追踪</div>
            <div class="card">可演示：Mock 模式无需模型密钥</div>
        </div>
        <label for="projectName">项目名称</label>
        <input id="projectName" value="订单管理后端系统" />

        <label for="techStack">技术栈</label>
        <input id="techStack" value="Java 17, Spring Boot 3, Maven, REST API, JUnit 5" />

        <label for="requirement">需求描述</label>
        <textarea id="requirement">构建一个订单管理后端模块，支持创建订单、查询订单详情、分页查询订单列表。需要校验参数、处理订单不存在异常，并生成单元测试和代码审查建议。</textarea>

        <div class="actions">
            <button onclick="runWorkflow()">运行 Agent 工作流</button>
            <button class="secondary" onclick="downloadZip()">导出生成代码 ZIP</button>
        </div>
        <pre id="output">结果将在这里展示。</pre>
    </section>
</div>
<script>
    function payload() {
        return {
            projectName: document.getElementById('projectName').value,
            techStack: document.getElementById('techStack').value,
            requirement: document.getElementById('requirement').value,
            generateTests: true,
            strictReview: true
        };
    }

    async function runWorkflow() {
        const output = document.getElementById('output');
        output.textContent = '正在运行多 Agent 工作流...';
        const response = await fetch('/api/workflows/backend-dev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload())
        });
        const json = await response.json();
        output.textContent = JSON.stringify(json, null, 2);
    }

    async function downloadZip() {
        const output = document.getElementById('output');
        output.textContent = '正在生成 ZIP...';
        const response = await fetch('/api/workflows/backend-dev/zip', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload())
        });
        if (!response.ok) {
            output.textContent = await response.text();
            return;
        }
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'agent-generated-code.zip';
        a.click();
        URL.revokeObjectURL(url);
        output.textContent = 'ZIP 已生成。';
    }
</script>
</body>
</html>
