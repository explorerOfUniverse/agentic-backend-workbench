services:
  agentic-backend-workbench:
    build: .
    container_name: agentic-backend-workbench
    ports:
      - "8080:8080"
    environment:
      AGENT_PROVIDER: mock
      # 使用真实模型时取消注释：
      # AGENT_PROVIDER: openai-compatible
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # OPENAI_BASE_URL: https://api.openai.com/v1
      # OPENAI_MODEL: gpt-4.1-mini
